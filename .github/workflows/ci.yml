name: Utility-Protocol CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rustfmt:
    name: Rust formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: utility-protocol-ci
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: utility-protocol-ci
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Rust tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: utility-protocol-ci
      - name: Run tests
        run: cargo test --workspace --all-features

  wasm:
    name: WASM build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: utility-protocol-ci
      - name: Build WASM artifacts
        run: cargo build --workspace --target wasm32-unknown-unknown --release
      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-artifacts
          path: target/wasm32-unknown-unknown/release/*.wasm
          if-no-files-found: error

  fuzz-detection:
    name: Fuzz infrastructure detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: utility-protocol-ci
      - name: Verify fuzz testing infrastructure
        run: |
          if [ -d "contracts/utility_contracts/fuzz" ]; then
            cargo install cargo-fuzz --locked
            cargo fuzz --version
            echo "✅ Fuzz testing infrastructure available"
          else
            echo "ℹ️ No fuzz tests found"
          fi
