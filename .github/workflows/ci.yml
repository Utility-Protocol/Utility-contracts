name: Utility-Protocol CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  docker-layer-cache:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rust-root
            target: rust-root-test
          - name: contracts
            target: contracts-test
          - name: wasm
            target: wasm-build
          - name: meter-simulator
            target: meter-simulator-test
          - name: usage-dashboard
            target: usage-dashboard-build
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.name }} with GitHub Actions cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          target: ${{ matrix.target }}
          push: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Run tests
        run: cargo test
      - name: Fuzz test detection
        run: |
          if [ -d "contracts/utility_contracts/fuzz" ]; then
            cargo install cargo-fuzz || true
            echo "✅ Fuzz testing infrastructure available"
          else
            echo "ℹ️ No fuzz tests found"
          fi

  build-wasm:
    needs: test-and-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Build WASM artifact
        run: cargo build --target wasm32-unknown-unknown --release
      - name: Upload compiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-artifacts
          path: target/wasm32-unknown-unknown/release/*.wasm
